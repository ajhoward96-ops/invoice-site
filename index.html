<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Invoice Portal - Master System</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- GLOBAL STYLES --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: #f0f2f5; 
            color: #1c1e21; 
        }

        .container { 
            max-width: 1200px; 
            margin: 40px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }

        /* --- LOGIN SYSTEM --- */
        #loginOverlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }

        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            text-align: center; 
            width: 420px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }

        .login-box input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 15px; 
        }

        #profileFields { 
            display: none; 
            margin-top: 15px; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
            text-align: left; 
        }

        /* --- DASHBOARD STYLES --- */
        #masterDashboard, #invoiceView { 
            display: none; 
        }

        .dash-header { 
            background: #2c3e50; 
            color: white; 
            padding: 25px; 
            border-radius: 8px; 
            text-align: center; 
            margin-bottom: 30px; 
        }

        .invoice-list { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 10px; 
        }

        .invoice-row td { 
            padding: 20px; 
            border-top: 1px solid #eee; 
            border-bottom: 1px solid #eee; 
            background: #fff; 
        }

        .invoice-row td:first-child { 
            font-weight: bold; 
            color: #007bff; 
            cursor: pointer; 
            border-left: 1px solid #eee;
            border-radius: 8px 0 0 8px; 
        }

        /* --- INVOICE HEADER --- */
        .payee-info { 
            border: 1px solid #eee; 
            padding: 25px; 
            border-radius: 8px; 
            background: #fafafa; 
            margin-bottom: 25px; 
        }

        .header-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 40px; 
        }

        .payee-info input { 
            border: none; 
            border-bottom: 1px solid #ddd; 
            width: 100%; 
            padding: 6px; 
            margin: 4px 0; 
            background: transparent; 
            outline: none; 
        }

        /* --- TABLE & GRID STYLES --- */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            table-layout: fixed; 
        }

        th { 
            background-color: #f8f9fa; 
            border: 1px solid #dee2e6; 
            padding: 12px; 
            font-size: 11px; 
            text-transform: uppercase; 
        }

        td { 
            border: 1px solid #dee2e6; 
            padding: 0; 
        }

        .item-row input { 
            width: 100%; 
            border: none; 
            padding: 12px; 
            box-sizing: border-box; 
            font-size: 13px; 
            background: transparent; 
        }

        /* --- SECTION BARS --- */
        .section-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #2c3e50; 
            color: white; 
            padding: 12px 15px; 
            font-weight: bold; 
            border-radius: 4px 4px 0 0;
        }

        .sec-name { 
            background: white !important; 
            color: #2c3e50 !important; 
            border: 1px solid #ccc !important; 
            border-radius: 4px; 
            padding: 4px 8px; 
            width: 150px; 
            font-weight: bold; 
            margin-left: 15px;
        }

        .rate-box { 
            background: white !important; 
            color: #2c3e50 !important; 
            border: 1px solid #ccc !important; 
            border-radius: 4px; 
            padding: 4px; 
            width: 60px; 
            font-weight: bold;
            margin-left: 5px;
        }

        /* --- BUTTONS & FOOTER --- */
        .btn { 
            padding: 12px 24px; 
            cursor: pointer; 
            font-weight: bold; 
            border: none; 
            border-radius: 4px; 
            transition: background 0.2s;
        }

        .btn-save { background: #6c757d; color: white; }
        .btn-submit { background: #007bff; color: white; }
        .btn-kick { background: #dc3545; color: white; }
        .btn-ready { background: #f39c12; color: white; }
        .btn-paid { background: #28a745; color: white; }

        .grand-total-box { 
            border: 2px solid #2c3e50; 
            padding: 15px 25px; 
            font-size: 1.4em; 
            font-weight: bold; 
            background: #fff; 
            border-radius: 8px; 
            display: flex; 
            gap: 40px; 
        }

        .minimize-btn { 
            cursor: pointer; 
            margin-right: 15px; 
            font-size: 18px; 
            user-select: none;
        }

        @media print { 
            .btn, #loginOverlay, #profileFields, #sectionAdder, .minimize-btn, .nav-arrow { 
                display: none !important; 
            } 
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Secure Legal Portal</h2>
        <input type="password" id="accessCode" placeholder="Enter Access Code" oninput="checkCodeType()">
        
        <div id="profileFields">
            <label style="font-size: 11px; font-weight: bold; color: #e67e22;">NEW USER SETUP</label>
            <input type="text" id="setupPayee" placeholder="Full Name (Payee)">
            <input type="text" id="setupFirm" placeholder="Attorney / Firm Name">
            <input type="text" id="setupAddress1" placeholder="Street Address">
            <input type="text" id="setupAddress2" placeholder="Apt / Suite #">
            <input type="text" id="setupAddress3" placeholder="City, State, Zip">
        </div>
        
        <button class="btn btn-submit" style="width:100%; margin-top:15px;" onclick="attemptLogin()">Login to System</button>
    </div>
</div>

<div class="container">
    <div id="masterDashboard">
        <div class="dash-header">
            <h1>Finance Master Dashboard</h1>
            <p>Managing global invoices and processing payments</p>
        </div>
        
        <h3>1. Pending Submissions</h3>
        <table class="invoice-list"><tbody id="pendingList"></tbody></table>
        
        <h3 style="color:#f39c12; margin-top: 40px;">2. Ready for Payment (Reviewed)</h3>
        <table class="invoice-list"><tbody id="readyList"></tbody></table>
        
        <h3 style="color:#28a745; margin-top: 40px;">3. Paid Archive</h3>
        <table class="invoice-list"><tbody id="paidList"></tbody></table>
    </div>

    <div id="invoiceView">
        <button onclick="location.reload()" id="backBtn" style="display:none; margin-bottom:20px;">⬅ Back to Dashboard</button>
        
        <div style="text-align:center">
            <h2 id="currentMonthDisplay">April 2026</h2>
        </div>
        
        <div class="payee-info">
            <div class="header-grid">
                <div>
                    <input type="text" id="payeeName" placeholder="PAYEE NAME" style="font-size: 26px; font-weight: bold;">
                    <input type="text" id="firmName" placeholder="Attorney / Firm Name">
                    <input type="text" id="address1" placeholder="Street Address">
                    <input type="text" id="address2" placeholder="Apt / Suite #">
                    <input type="text" id="address3" placeholder="City, State, Zip">
                </div>
                <div style="text-align: right;">
                    <div>Date: <span id="todayDate"></span></div>
                    <div style="margin-top:10px;">
                        Invoice #: <input type="text" id="invNum" placeholder="JT0326" style="width: 120px; text-align: right; border-bottom: 1px solid #000;">
                    </div>
                </div>
            </div>
        </div>

        <div id="invoiceContainer"></div>

        <div id="sectionAdder" style="background:#f8f9fa; padding:20px; border:1px dashed #ccc; margin-top:20px; border-radius:8px;">
            <strong>Add Billing Category:</strong>
            <select id="categorySelector" style="padding:8px; margin:0 10px;">
                <option value="Defender">Defender</option>
                <option value="Paralegal Services">Paralegal Services</option>
                <option value="Expenses">Expenses</option>
                <option value="MCLAP General">MCLAP General</option>
            </select>
            <button class="btn btn-submit" onclick="createNewSection()">+ Add to Invoice</button>
        </div>

        <div style="margin-top:40px; display:flex; justify-content:space-between; align-items:center; border-top: 2px solid #eee; padding-top:25px;">
            <div id="userActions" style="display:flex; gap:12px;">
                <button class="btn btn-save" onclick="saveData(false)">Sync Progress</button>
                <button class="btn btn-submit" onclick="saveData(true)">Submit for Review</button>
                <button class="btn" style="background:#1f6e43; color:white" onclick="exportToExcel()">Export Excel</button>
            </div>
            
            <div id="adminActions" style="display:none; gap:12px;">
                <button class="btn btn-kick" onclick="setInvoiceStatus(activeAdminInvoiceId, 'Sent Back')">Kickback</button>
                <button class="btn btn-ready" onclick="setInvoiceStatus(activeAdminInvoiceId, 'Ready for Payment')">Approve for Payment</button>
            </div>

            <div class="grand-total-box">
                <div>Hrs: <span id="totalHoursDisplay">0.00</span></div>
                <div>Total: <span id="grandTotalDisplay">$0.00</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    /* --- DATABASE CONFIG --- */
    const SUPABASE_URL = 'https://cfliviopdogrljkxzuaa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_NL24nDck9VjS3QMbzIPwDg_bWzWUpW9';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* --- APP STATE --- */
    let currentUserCode = "";
    let isNewUser = false;
    let activeAdminInvoiceId = "";
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    window.onload = () => {
        document.getElementById('todayDate').innerText = new Date().toLocaleDateString();
    };

    /* --- LOGIN LOGIC --- */
    async function checkCodeType() {
        const code = document.getElementById('accessCode').value.trim().toUpperCase();
        if (code === "FINANCE2026" || code.length < 3) {
            document.getElementById('profileFields').style.display = "none";
            return;
        }
        
        // Check if user already exists in DB
        const { data } = await supabaseClient.from('invoices').select('user_code').eq('user_code', code).limit(1);
        isNewUser = (!data || data.length === 0);
        document.getElementById('profileFields').style.display = isNewUser ? "block" : "none";
    }

    async function attemptLogin() {
        const code = document.getElementById('accessCode').value.trim();
        if (!code) return;

        currentUserCode = code;
        document.getElementById('loginOverlay').style.display = "none";

        if (code.toUpperCase() === "FINANCE2026") {
            loadFinanceDashboard();
        } else {
            // Populate profile if user is new
            if (isNewUser) {
                document.getElementById('payeeName').value = document.getElementById('setupPayee').value;
                document.getElementById('firmName').value = document.getElementById('setupFirm').value;
                document.getElementById('address1').value = document.getElementById('setupAddress1').value;
                document.getElementById('address2').value = document.getElementById('setupAddress2').value;
                document.getElementById('address3').value = document.getElementById('setupAddress3').value;
            }
            document.getElementById('invoiceView').style.display = "block";
            loadUserInvoiceData();
        }
    }

    /* --- FINANCE DASHBOARD --- */
    async function loadFinanceDashboard() {
        document.getElementById('masterDashboard').style.display = "block";
        document.getElementById('invoiceView').style.display = "none";

        const { data, error } = await supabaseClient.from('invoices').select('*').eq('submitted', true).order('updated_at', { ascending: false });
        
        const pList = document.getElementById('pendingList');
        const rList = document.getElementById('readyList');
        const aList = document.getElementById('paidList');
        
        pList.innerHTML = ""; rList.innerHTML = ""; aList.innerHTML = "";

        data.forEach(inv => {
            const rowHTML = `
                <tr class="invoice-row">
                    <td onclick="loadInvoiceForAdminReview('${inv.month_year}')">${inv.payee || 'Unnamed Lawyer'}</td>
                    <td>${new Date(inv.updated_at).toLocaleDateString()}</td>
                    <td style="text-align:right">
                        ${inv.status === 'Ready for Payment' ? `<button class="btn btn-paid" onclick="setInvoiceStatus('${inv.month_year}', 'Paid')">Confirm Paid</button>` : inv.status}
                    </td>
                </tr>`;
            
            if (inv.status === 'Paid') aList.innerHTML += rowHTML;
            else if (inv.status === 'Ready for Payment') rList.innerHTML += rowHTML;
            else pList.innerHTML += rowHTML;
        });
    }

    async function setInvoiceStatus(id, newStatus) {
        await supabaseClient.from('invoices').update({ status: newStatus }).eq('month_year', id);
        location.reload(); // Refresh dashboard
    }

    /* --- INVOICE ENGINE (LAWYER SIDE) --- */
    function createNewSection(savedData = null) {
        const id = savedData ? savedData.id : Date.now();
        const category = savedData ? savedData.category : document.getElementById('categorySelector').value;
        
        const sectionDiv = document.createElement('div');
        sectionDiv.id = `sec-${id}`;
        sectionDiv.style.marginBottom = "30px";

        // Logic for Category with Name field
        let nameFieldHTML = (category === "Defender" || category === "Paralegal Services") 
            ? `<input type="text" placeholder="Name of Person" class="sec-name" value="${savedData?.personName || ''}">` 
            : "";

        sectionDiv.innerHTML = `
            <div class="section-bar">
                <span><span class="minimize-btn" onclick="toggleSectionVisibility('${id}')">▼</span> ${category} ${nameFieldHTML}</span>
                <div>
                    Rate: $<input type="number" class="rate-box" value="${savedData?.rate || 0}" oninput="recalculateAllTotals()"> 
                    <button style="color:red; background:none; border:none; cursor:pointer; font-weight:bold; margin-left:10px;" onclick="removeSection('${id}')">✕</button>
                </div>
            </div>
            <div id="content-${id}">
                <table>
                    <thead>
                        <tr>
                            <th style="width:160px;">Date</th>
                            <th>Description of Services</th>
                            <th style="width:100px;">Time</th>
                            <th style="width:130px;">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="body-${id}"></tbody>
                    <tr class="total-row">
                        <td colspan="2" style="text-align:right; padding:12px;">Subtotal</td>
                        <td id="subtotal-hrs-${id}" style="text-align:center;">0.00</td>
                        <td id="subtotal-val-${id}" style="text-align:right; padding-right:15px;">$0.00</td>
                    </tr>
                </table>
                <button class="btn btn-save" style="font-size:11px; margin-top:8px; padding: 6px 12px;" onclick="addNewLineItem('${id}')">+ Add Row</button>
            </div>`;

        document.getElementById('invoiceContainer').appendChild(sectionDiv);
        
        if (savedData && savedData.rows) {
            savedData.rows.forEach(row => addNewLineItem(id, row));
        } else {
            addNewLineItem(id);
        }
    }

    function addNewLineItem(sectionId, rowData = null) {
        const tbody = document.getElementById(`body-${sectionId}`);
        const row = document.createElement('tr');
        row.className = "item-row";
        
        row.innerHTML = `
            <td><input type="date" value="${rowData?.date || ''}" onchange="recalculateAllTotals()"></td>
            <td><input type="text" value="${rowData?.desc || ''}" placeholder="Enter service description..."></td>
            <td><input type="number" step="0.01" class="time-input" value="${rowData?.time || ''}" onchange="recalculateAllTotals()"></td>
            <td class="row-total" style="text-align:right; padding-right:15px;">$0.00</td>
        `;
        
        tbody.appendChild(row);
        recalculateAllTotals();
    }

    function toggleSectionVisibility(id) {
        const content = document.getElementById(`content-${id}`);
        content.style.display = (content.style.display === "none") ? "block" : "none";
    }

    function removeSection(id) {
        if (confirm("Permanently remove this billing category?")) {
            document.getElementById(`sec-${id}`).remove();
            recalculateAllTotals();
        }
    }

    function recalculateAllTotals() {
        let grandTotalVal = 0;
        let grandTotalHrs = 0;

        document.querySelectorAll('[id^="sec-"]').forEach(section => {
            let sectionHrs = 0;
            let sectionVal = 0;
            const rate = parseFloat(section.querySelector('.rate-box').value) || 0;
            
            section.querySelectorAll('.item-row').forEach(row => {
                const time = parseFloat(row.querySelector('.time-input').value) || 0;
                const rowVal = time * rate;
                
                row.querySelector('.row-total').innerText = `$${rowVal.toFixed(2)}`;
                sectionHrs += time;
                sectionVal += rowVal;
            });

            const secId = section.id.replace('sec-', '');
            document.getElementById(`subtotal-hrs-${secId}`).innerText = sectionHrs.toFixed(2);
            document.getElementById(`subtotal-val-${secId}`).innerText = `$${sectionVal.toFixed(2)}`;
            
            grandTotalHrs += sectionHrs;
            grandTotalVal += sectionVal;
        });

        document.getElementById('totalHoursDisplay').innerText = grandTotalHrs.toFixed(2);
        document.getElementById('grandTotalDisplay').innerText = `$${grandTotalVal.toFixed(2)}`;
    }

    /* --- DATA MANAGEMENT --- */
    async function saveData(isSubmission) {
        const allSections = Array.from(document.querySelectorAll('[id^="sec-"]')).map(sec => ({
            id: sec.id.replace('sec-', ''),
            category: sec.querySelector('.section-bar span').innerText.replace('▼ ', '').split(' ')[0],
            personName: sec.querySelector('.sec-name')?.value || "",
            rate: sec.querySelector('.rate-box').value,
            rows: Array.from(sec.querySelectorAll('.item-row')).map(row => ({
                date: row.cells[0].querySelector('input').value,
                desc: row.cells[1].querySelector('input').value,
                time: row.cells[2].querySelector('input').value
            }))
        }));

        const payload = {
            month_year: `April_2026_${currentUserCode}`,
            user_code: currentUserCode,
            payee: document.getElementById('payeeName').value,
            firm: document.getElementById('firmName').value,
            address1: document.getElementById('address1').value,
            address2: document.getElementById('address2').value,
            address3: document.getElementById('address3').value,
            inv_num: document.getElementById('invNum').value,
            sections: allSections,
            submitted: isSubmission,
            updated_at: new Date().toISOString()
        };

        const { error } = await supabaseClient.from('invoices').upsert(payload, { onConflict: 'month_year' });
        
        if (error) {
            alert("Sync Error: " + error.message);
        } else {
            alert(isSubmission ? "Successfully Submitted to Finance!" : "Progress Synced to Cloud.");
        }
    }

    async function loadUserInvoiceData() {
        const { data, error } = await supabaseClient.from('invoices').select('*').eq('month_year', `April_2026_${currentUserCode}`).single();
        
        if (data) {
            document.getElementById('payeeName').value = data.payee || "";
            document.getElementById('firmName').value = data.firm || "";
            document.getElementById('address1').value = data.address1 || "";
            document.getElementById('address2').value = data.address2 || "";
            document.getElementById('address3').value = data.address3 || "";
            document.getElementById('invNum').value = data.inv_num || "";
            
            document.getElementById('invoiceContainer').innerHTML = "";
            data.sections.forEach(s => createNewSection(s));
        }
    }

    async function loadInvoiceForAdminReview(id) {
        activeAdminInvoiceId = id;
        document.getElementById('masterDashboard').style.display = "none";
        document.getElementById('invoiceView').style.display = "block";
        document.getElementById('backBtn').style.display = "block";
        document.getElementById('userActions').style.display = "none";
        document.getElementById('adminActions').style.display = "flex";
        document.getElementById('sectionAdder').style.display = "none";

        const { data } = await supabaseClient.from('invoices').select('*').eq('month_year', id).single();
        if (data) {
            document.getElementById('payeeName').value = data.payee;
            document.getElementById('firmName').value = data.firm;
            document.getElementById('address1').value = data.address1;
            document.getElementById('address2').value = data.address2;
            document.getElementById('address3').value = data.address3;
            document.getElementById('invNum').value = data.inv_num;
            
            document.getElementById('invoiceContainer').innerHTML = "";
            data.sections.forEach(s => createNewSection(s));
            recalculateAllTotals();
        }
    }

    function exportToExcel() {
        let exportSheetData = [
            [document.getElementById('payeeName').value],
            [document.getElementById('firmName').value],
            [document.getElementById('address1').value],
            [document.getElementById('address2').value],
            [document.getElementById('address3').value],
            [],
            ["Invoice Date:", document.getElementById('todayDate').innerText],
            ["Invoice #:", document.getElementById('invNum').value],
            []
        ];

        document.querySelectorAll('[id^="sec-"]').forEach(section => {
            let catHeader = section.querySelector('.section-bar span').innerText.replace('▼ ', '');
            exportSheetData.push([catHeader.toUpperCase(), "", "", "Rate:", `$${section.querySelector('.rate-box').value}`]);
            exportSheetData.push(["Date", "Description of Service", "Time", "Amount"]);
            
            section.querySelectorAll('.item-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                exportSheetData.push([inputs[0].value, inputs[1].value, inputs[2].value, row.querySelector('.row-total').innerText]);
            });
            
            const secId = section.id.replace('sec-', '');
            exportSheetData.push(["", "SUBTOTAL", document.getElementById(`subtotal-hrs-${secId}`).innerText, document.getElementById(`subtotal-val-${secId}`).innerText]);
            exportSheetData.push([]);
        });

        exportSheetData.push(["SUMMARY"]);
        exportSheetData.push(["Total Hours:", document.getElementById('totalHoursDisplay').innerText]);
        exportSheetData.push(["Grand Total:", document.getElementById('grandTotalDisplay').innerText]);

        const worksheet = XLSX.utils.aoa_to_sheet(exportSheetData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Invoice");
        XLSX.writeFile(workbook, `Invoice_Draft_${currentUserCode}.xlsx`);
    }
</script>

</body>
</html>
