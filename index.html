<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legal Invoice Portal - Master System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; color: #1c1e21; }
        .container { max-width: 1200px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        #loginOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 420px; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        #profileFields { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; text-align: left; }
        #masterDashboard, #invoiceView { display: none; }
        .dash-header { background: #2c3e50; color: white; padding: 25px; border-radius: 8px; text-align: center; margin-bottom: 30px; }
        .invoice-list { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .invoice-row td { padding: 20px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; background: #fff; }
        .invoice-row td:first-child { font-weight: bold; color: #007bff; cursor: pointer; border-radius: 8px 0 0 8px; }
        .payee-info { border: 1px solid #eee; padding: 25px; border-radius: 8px; background: #fafafa; margin-bottom: 25px; }
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .payee-info input { border: none; border-bottom: 1px solid #ddd; width: 100%; padding: 6px; margin: 4px 0; background: transparent; outline: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background: #f8f9fa; border: 1px solid #dee2e6; padding: 12px; font-size: 11px; text-transform: uppercase; }
        .item-row input { width: 100%; border: none; padding: 12px; box-sizing: border-box; background: transparent; }
        .section-bar { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: white; padding: 12px 15px; font-weight: bold; }
        .rate-input { background: white !important; color: #2c3e50 !important; border-radius: 4px; padding: 4px; width: 60px; font-weight: bold; border: 1px solid #ccc; }
        .grand-total-box { border: 2px solid #2c3e50; padding: 15px; font-size: 1.3em; font-weight: bold; display: flex; gap: 40px; }
        .btn { padding: 12px 24px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; }
        .btn-save { background: #6c757d; color: white; }
        .btn-submit { background: #007bff; color: white; }
        .btn-kick { background: #dc3545; color: white; }
        .btn-ready { background: #f39c12; color: white; }
        .btn-paid { background: #28a745; color: white; }
        @media print { .btn, .login-box, #profileFields, #sectionAdder, .nav-arrow { display: none !important; } }
    </style>
</head>
<body>
<div id="loginOverlay"><div class="login-box"><h2>Legal Portal</h2><input type="password" id="accessCode" placeholder="Access Code" oninput="checkCode()"><div id="profileFields"><input type="text" id="sP" placeholder="Full Name"><input type="text" id="sF" placeholder="Firm"><input type="text" id="sA1" placeholder="Street"><input type="text" id="sA2" placeholder="Suite #"><input type="text" id="sA3" placeholder="City, State, Zip"></div><button class="btn btn-submit" style="width:100%; margin-top:15px;" onclick="login()">Login</button></div></div>
<div class="container">
    <div id="masterDashboard"><div class="dash-header"><h1>Finance Master</h1></div><h3>1. Pending</h3><table class="invoice-list"><tbody id="pList"></tbody></table><h3 style="color:#f39c12">2. Ready for Payment</h3><table class="invoice-list"><tbody id="rList"></tbody></table><h3 style="color:#28a745">3. Paid Archive</h3><table class="invoice-list"><tbody id="aList"></tbody></table></div>
    <div id="invoiceView"><button onclick="location.reload()" id="backBtn" style="display:none; margin-bottom:20px;">⬅ Back</button><div style="text-align:center"><h2>April 2026</h2></div>
        <div class="payee-info"><div class="header-grid"><div><input type="text" id="pN" placeholder="NAME" style="font-size:24px; font-weight:bold"><input type="text" id="fN" placeholder="Firm"><input type="text" id="a1" placeholder="Street"><input type="text" id="a2" placeholder="Suite"><input type="text" id="a3" placeholder="City, Zip"></div><div style="text-align:right">Date: <span id="today"></span><br>Inv #: <input type="text" id="iN" style="width:100px; text-align:right; border-bottom:1px solid #000"></div></div></div>
        <div id="invoiceContainer"></div>
        <div id="sectionAdder" style="background:#f8f9fa; padding:20px; border:1px dashed #ccc; margin-top:20px;"><select id="cSel"><option>Defendant</option><option>Paralegal Services</option><option>Expenses</option></select> <button class="btn btn-submit" onclick="addSec()">+ Add Section</button></div>
        <div style="margin-top:40px; display:flex; justify-content:space-between; align-items:center"><div id="uAct"><button class="btn btn-save" onclick="save(false)">Sync</button> <button class="btn btn-submit" onclick="save(true)">Submit</button> <button class="btn" style="background:#1f6e43; color:white" onclick="exportXLS()">Excel</button></div><div id="aAct" style="display:none; gap:12px;"><button class="btn btn-kick" onclick="setS(aId, 'Sent Back')">Kickback</button><button class="btn btn-ready" onclick="setS(aId, 'Ready for Payment')">Approve Review</button></div><div class="grand-total-box">Hrs: <span id="tH">0.00</span> Total: <span id="gT">$0.00</span></div></div>
    </div>
</div>
<script>
    const S_URL = 'https://cfliviopdogrljkxzuaa.supabase.co', S_KEY = 'sb_publishable_NL24nDck9VjS3QMbzIPwDg_bWzWUpW9';
    const client = supabase.createClient(S_URL, S_KEY);
    let uCode = "", isN = false, aId = "";
    window.onload = () => { document.getElementById('today').innerText = new Date().toLocaleDateString(); };

    async function checkCode() {
        const c = document.getElementById('accessCode').value.trim().toUpperCase();
        if (c === "FINANCE2026" || c.length < 3) { document.getElementById('profileFields').style.display = "none"; return; }
        const { data } = await client.from('invoices').select('user_code').eq('user_code', c).limit(1);
        isN = (!data || data.length === 0);
        document.getElementById('profileFields').style.display = isN ? "block" : "none";
    }

    async function login() {
        uCode = document.getElementById('accessCode').value.trim(); if (!uCode) return;
        document.getElementById('loginOverlay').style.display = "none";
        if (uCode.toUpperCase() === "FINANCE2026") loadDash(); 
        else {
            if (isN) { document.getElementById('pN').value = document.getElementById('sP').value; document.getElementById('fN').value = document.getElementById('sF').value; document.getElementById('a1').value = document.getElementById('sA1').value; document.getElementById('a2').value = document.getElementById('sA2').value; document.getElementById('a3').value = document.getElementById('sA3').value; }
            document.getElementById('invoiceView').style.display = "block"; loadData();
        }
    }

    async function loadDash() {
        document.getElementById('masterDashboard').style.display = "block";
        const { data } = await client.from('invoices').select('*').eq('submitted', true);
        const pL = document.getElementById('pList'), rL = document.getElementById('rList'), aL = document.getElementById('aList');
        pL.innerHTML = ""; rL.innerHTML = ""; aL.innerHTML = "";
        data.forEach(i => {
            const row = `<tr class="invoice-row"><td onclick="loadAdmin('${i.month_year}')">${i.payee || 'Lawyer'}</td><td>${new Date(i.updated_at).toLocaleDateString()}</td><td style="text-align:right">${i.status==='Ready for Payment' ? `<button class="btn btn-paid" onclick="setS('${i.month_year}', 'Paid')">Confirm Paid</button>` : i.status}</td></tr>`;
            if (i.status === 'Paid') aL.innerHTML += row; else if (i.status === 'Ready for Payment') rL.innerHTML += row; else pL.innerHTML += row;
        });
    }

    async function setS(id, s) { await client.from('invoices').update({ status: s }).eq('month_year', id); location.reload(); }

    function addSec(saved = null) {
        const id = saved ? saved.id : Date.now();
        const cat = saved ? saved.category : document.getElementById('cSel').value;
        const div = document.createElement('div'); div.id = `sec-${id}`; div.style.marginBottom = "30px";
        div.innerHTML = `<div class="section-bar"><span>${cat}</span><div>Rate: $<input type="number" class="rate-input" value="${saved?.rate || 0}" oninput="calc()"> <button style="color:red; background:none; border:none; cursor:pointer" onclick="this.parentElement.parentElement.parentElement.remove();calc()">✕</button></div></div><table><tbody id="body-${id}"></tbody><tr style="background:#fff9c4"><td>Subtotal</td><td></td><td id="t-${id}" style="text-align:center">0.00</td><td id="p-${id}" style="text-align:right">$0.00</td></tr></table><button class="btn btn-save" style="font-size:10px" onclick="addRow('${id}')">+ Line</button>`;
        document.getElementById('invoiceContainer').appendChild(div);
        if (saved) saved.rows.forEach(r => addRow(id, r)); else addRow(id);
    }

    function addRow(id, d = null) {
        const tr = document.createElement('tr'); tr.className = "item-row";
        tr.innerHTML = `<td><input type="date" value="${d?.date || ''}" onchange="calc()"></td><td><input type="text" value="${d?.desc || ''}"></td><td><input type="number" step="0.01" class="time" value="${d?.time || ''}" onchange="calc()"></td><td class="r-total" style="text-align:right">$0.00</td>`;
        document.getElementById(`body-${id}`).appendChild(tr); calc();
    }

    function calc() {
        let h = 0, g = 0;
        document.querySelectorAll('[id^="sec-"]').forEach(s => {
            let sh = 0, sp = 0; const r = parseFloat(s.querySelector('.rate-input').value) || 0;
            s.querySelectorAll('.item-row').forEach(row => { const t = parseFloat(row.querySelector('.time').value) || 0; const tot = t * r; row.querySelector('.r-total').innerText = `$${tot.toFixed(2)}`; sh += t; sp += tot; });
            const id = s.id.replace('sec-', ''); document.getElementById(`t-${id}`).innerText = sh.toFixed(2); document.getElementById(`p-${id}`).innerText = `$${sp.toFixed(2)}`; h += sh; g += sp;
        });
        document.getElementById('tH').innerText = h.toFixed(2); document.getElementById('gT').innerText = `$${g.toFixed(2)}`;
    }

    async function save(final) {
        const sects = Array.from(document.querySelectorAll('[id^="sec-"]')).map(s => ({ category: s.querySelector('.section-bar span').innerText, rate: s.querySelector('.rate-input').value, rows: Array.from(s.querySelectorAll('.item-row')).map(r => ({ date: r.cells[0].querySelector('input').value, desc: r.cells[1].querySelector('input').value, time: r.cells[2].querySelector('input').value })) }));
        const p = { month_year: `April_2026_${uCode}`, user_code: uCode, payee: document.getElementById('pN').value, firm: document.getElementById('fN').value, address1: document.getElementById('a1').value, address2: document.getElementById('a2').value, address3: document.getElementById('a3').value, inv_num: document.getElementById('iN').value, sections: sects, submitted: final, updated_at: new Date().toISOString() };
        await client.from('invoices').upsert(p, { onConflict: 'month_year' }); alert(final ? "Submitted!" : "Saved!");
    }

    async function loadData() {
        const { data } = await client.from('invoices').select('*').eq('month_year', `April_2026_${uCode}`).single();
        if (data) { document.getElementById('pN').value = data.payee; document.getElementById('fN').value = data.firm; document.getElementById('a1').value = data.address1; document.getElementById('a2').value = data.address2; document.getElementById('a3').value = data.address3; document.getElementById('iN').value = data.inv_num; data.sections.forEach(s => addSec(s)); }
    }

    async function loadAdmin(id) {
        aId = id; document.getElementById('masterDashboard').style.display = "none"; document.getElementById('invoiceView').style.display = "block";
        document.getElementById('backBtn').style.display = "block"; document.getElementById('uAct').style.display = "none"; document.getElementById('aAct').style.display = "flex";
        document.getElementById('sectionAdder').style.display = "none";
        const { data } = await client.from('invoices').select('*').eq('month_year', id).single();
        if (data) { document.getElementById('pN').value = data.payee; document.getElementById('fN').value = data.firm; document.getElementById('a1').value = data.address1; document.getElementById('a2').value = data.address2; document.getElementById('a3').value = data.address3; data.sections.forEach(s => addSec(s)); calc(); }
    }

    function exportXLS() {
        let d = [[document.getElementById('pN').value],[document.getElementById('fN').value],[document.getElementById('a1').value],[document.getElementById('a2').value],[document.getElementById('a3').value],[],["Date:",document.getElementById('today').innerText],[]];
        document.querySelectorAll('[id^="sec-"]').forEach(s => { d.push([s.querySelector('.section-bar span').innerText.toUpperCase(),"","","Rate:",`$${s.querySelector('.rate-input').value}`]); d.push(["Date","Desc","Time","Total"]); s.querySelectorAll('.item-row').forEach(r => { const c = r.querySelectorAll('input'); d.push([c[0].value, c[1].value, c[2].value, r.querySelector('.r-total').innerText]); }); d.push(["","SUBTOTAL",s.querySelector(`[id^="t-"]`).innerText,s.querySelector(`[id^="p-"]`).innerText],[]); });
        const ws = XLSX.utils.aoa_to_sheet(d), wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Inv"); XLSX.writeFile(wb,`Inv_${uCode}.xlsx`);
    }
</script>
</body>
</html>
