<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legal Invoice Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .setup-area { background: #eef2f3; padding: 20px; border-radius: 8px; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .billing-section { border: 2px solid #eaeeef; padding: 25px; margin-top: 25px; border-radius: 8px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f4f7f6; padding-bottom: 15px; margin-bottom: 20px; }
        .grid-row { display: grid; grid-template-columns: 150px 1fr 120px 120px 120px; gap: 15px; margin-bottom: 12px; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ced4da; border-radius: 4px; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #007bff; color: white; }
        .btn-excel { background: #1d6f42; color: white; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: right; font-style: italic;">Submission Date: <span id="todayDate"></span></div>
    <div class="setup-area">
        <strong>New Section:</strong>
        <select id="categorySelector">
            <option value="">-- Select --</option>
            <option value="Defendant">Defendant</option>
            <option value="Training">Training</option>
            <option value="MCLAP General">MCLAP General</option>
            <option value="Expenses">Expenses</option>
        </select>
        <button class="btn btn-add" onclick="createSection()">Add Section</button>
    </div>
    <div id="invoiceContainer"></div>
    <button class="btn btn-excel" onclick="exportToExcel()">Export to Excel</button>
</div>

<script>
    window.onload = () => { document.getElementById('todayDate').innerText = new Date().toLocaleDateString(); };

    function createSection() {
        const cat = document.getElementById('categorySelector').value;
        if (!cat) return;
        const id = Date.now();
        const div = document.createElement('div');
        div.className = 'billing-section';
        div.id = `sec-${id}`;
        
        const header = (cat === "Defendant") ? `<input type="text" placeholder="Type Defendant Name..." style="font-size:1.2em; width:300px;">` : `<h2>${cat}</h2>`;
        
        div.innerHTML = `
            <div class="section-header">${header} <div>Rate: $<input type="number" id="rate-${id}" value="0" style="width:60px;" oninput="calc('${id}')"></div></div>
            <div class="grid-row">
                <input type="date">
                <select><option>Select Task...</option><option>Administrative</option><option>Research</option></select>
                <input type="number" step="0.1" class="time-in" onchange="valTime(this);calc('${id}')" placeholder="0.x0">
                <div id="sum-${id}" style="font-weight:bold;">$0.00</div>
                <button onclick="this.parentElement.parentElement.remove()">X</button>
            </div>`;
        document.getElementById('invoiceContainer').appendChild(div);
    }

    function valTime(i) { i.value = (Math.round(parseFloat(i.value) * 10) / 10).toFixed(2).replace(/\d$/, '0'); }
    function calc(id) {
        const r = document.getElementById(`rate-${id}`).value;
        const t = document.querySelector(`#sec-${id} .time-in`).value;
        document.getElementById(`sum-${id}`).innerText = `$${(r * t).toFixed(2)}`;
    }
    function exportToExcel() {
        const ws = XLSX.utils.table_to_sheet(document.getElementById('invoiceContainer'));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Invoice");
        XLSX.writeFile(wb, "Invoice.xlsx");
    }
</script>
</body>
</html>
