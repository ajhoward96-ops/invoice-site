<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legal Invoice Portal - Master Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f2f5; color: #1c1e21; }
        .container { max-width: 1200px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Login Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-box h2 { margin-top: 0; color: #2c3e50; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        
        /* Master Dashboard Styles */
        #masterDashboard { display: none; }
        .dash-header { background: #2c3e50; color: white; padding: 25px; border-radius: 8px; text-align: center; margin-bottom: 30px; }
        .dash-header h1 { margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        .invoice-list { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .invoice-row { background: #fff; border: 1px solid #ddd; }
        .invoice-row td { padding: 20px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .invoice-row td:first-child { border-left: 1px solid #eee; border-radius: 8px 0 0 8px; font-weight: bold; color: #007bff; cursor: pointer; }
        .invoice-row td:last-child { border-right: 1px solid #eee; border-radius: 0 8px 8px 0; }

        .btn-main { background: #27ae60; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        .btn-paid { background: #28a745; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; display: none; }
        .btn-kickback { background: #dc3545; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px; }

        #invoiceView { display: none; }
        .admin-notice { background: #fff3cd; color: #856404; padding: 10px; text-align: center; font-weight: bold; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Legal Portal</h2>
        <p>Enter Access Code</p>
        <input type="password" id="accessCode" placeholder="••••••••">
        <button class="btn-main" onclick="attemptLogin()">Login</button>
    </div>
</div>

<div class="container">
    <div id="masterDashboard">
        <div class="dash-header">
            <h1>Master Access Dashboard</h1>
            <p>Viewing and editing all cloud logs</p>
        </div>
        
        <h3>Pending Submissions</h3>
        <table class="invoice-list">
            <tbody id="pendingList"></tbody>
        </table>

        <div style="margin-top: 50px; border-top: 2px solid #eee; padding-top: 20px;">
            <h3 style="color: #28a745;">✅ PAID ARCHIVE</h3>
            <table class="invoice-list">
                <tbody id="paidList"></tbody>
            </table>
        </div>
    </div>

    <div id="invoiceView">
        <div id="adminNotice" class="admin-notice" style="display:none;">MASTER VIEW: Editing Mode</div>
        <button onclick="showDashboard()" id="backBtn" style="display:none; margin-bottom:20px; padding: 10px; cursor:pointer;">⬅ Back to Dashboard</button>
        <div id="invoiceContent">
            <h2 id="viewPayeeName"></h2>
            <div id="invoiceContainer"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://cfliviopdogrljkxzuaa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_NL24nDck9VjS3QMbzIPwDg_bWzWUpW9';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let isAdmin = false;

    async function attemptLogin() {
        const code = document.getElementById('accessCode').value.trim();
        if (!code) return;

        if (code.toUpperCase() === 'FINANCE2026') {
            isAdmin = true;
            document.getElementById('loginOverlay').style.display = "none";
            showDashboard();
        } else {
            // Standard User Logic
            isAdmin = false;
            document.getElementById('loginOverlay').style.display = "none";
            document.getElementById('invoiceView').style.display = "block";
            // Normal user loading logic would go here
        }
    }

    async function showDashboard() {
        document.getElementById('masterDashboard').style.display = "block";
        document.getElementById('invoiceView').style.display = "none";
        
        const { data } = await supabase.from('invoices').select('*').order('updated_at', { ascending: false });
        
        const pendingList = document.getElementById('pendingList');
        const paidList = document.getElementById('paidList');
        pendingList.innerHTML = "";
        paidList.innerHTML = "";

        data.forEach(inv => {
            const row = `
                <tr class="invoice-row">
                    <td onclick="loadInvoice('${inv.month_year}')">${inv.payee || 'Unnamed Lawyer'}</td>
                    <td>${new Date(inv.updated_at).toLocaleDateString()}</td>
                    <td style="text-align: right;">
                        ${inv.status !== 'Paid' ? `
                            <label><input type="checkbox" onchange="document.getElementById('p-${inv.month_year}').style.display = this.checked ? 'inline-block' : 'none'"> Correct</label>
                            <button id="p-${inv.month_year}" class="btn-paid" style="background:#28a745; color:white; border:none; padding:8px; border-radius:4px; margin-left:10px;" onclick="setStatus('${inv.month_year}', 'Paid')">Paid</button>
                            <button class="btn-kickback" onclick="setStatus('${inv.month_year}', 'Sent Back')">Sent Back</button>
                        ` : '<span style="color:green; font-weight:bold;">PROCESSED</span>'}
                    </td>
                </tr>
            `;
            if (inv.status === 'Paid') paidList.innerHTML += row;
            else pendingList.innerHTML += row;
        });
    }

    async function setStatus(id, status) {
        await supabase.from('invoices').update({ status: status }).eq('month_year', id);
        showDashboard();
    }

    async function loadInvoice(id) {
        const { data } = await supabase.from('invoices').select('*').eq('month_year', id).single();
        if (data) {
            document.getElementById('masterDashboard').style.display = "none";
            document.getElementById('invoiceView').style.display = "block";
            document.getElementById('adminNotice').style.display = "block";
            document.getElementById('backBtn').style.display = "block";
            document.getElementById('viewPayeeName').innerText = "Reviewing: " + data.payee;
            
            // Logic to render the specific invoice items
            const container = document.getElementById('invoiceContainer');
            container.innerHTML = `<pre>${JSON.stringify(data.sections, null, 2)}</pre>`;
        }
    }
</script>
</body>
</html>
