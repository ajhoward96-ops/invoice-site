<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legal Invoice Creator - Secure Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .admin-bar { background: #ffc107; padding: 10px; margin-bottom: 20px; border-radius: 4px; display: none; font-weight: bold; }
        .month-nav { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 20px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; }
        .nav-arrow { font-size: 24px; cursor: pointer; padding: 5px 15px; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
        .payee-info { margin-bottom: 20px; border: 1px solid #eee; padding: 20px; border-radius: 8px; }
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .payee-info input { border: none; border-bottom: 1px solid #eee; width: 100%; padding: 5px; margin: 4px 0; outline: none; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 12px; font-size: 11px; text-transform: uppercase; color: #666; }
        td { border: 1px solid #dee2e6; padding: 0; }
        input { width: 100%; border: none; padding: 12px; box-sizing: border-box; font-size: 13px; background: transparent; }
        .section-bar { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: #fff; padding: 12px 15px; font-weight: bold; border-radius: 4px 4px 0 0; }
        .total-row { background-color: #fff9c4; font-weight: bold; }
        .grand-total-box { border: 2px solid #2c3e50; padding: 15px 25px; font-size: 1.4em; font-weight: bold; background: #fff; border-radius: 8px; display: flex; gap: 40px; }
        .btn { padding: 12px 24px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; transition: opacity 0.2s; }
        .btn-save { background: #27ae60; color: white; }
        .btn-excel { background: #1f6e43; color: white; }
        .time-error { background-color: #ffdce0 !important; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>Invoice Portal</h3>
        <p>Enter your Personal Code or Master Key</p>
        <input type="password" id="accessCode" placeholder="••••••••">
        <button class="btn btn-save" style="width:100%" onclick="attemptLogin()">Access System</button>
    </div>
</div>

<div class="container">
    <div id="adminNotice" class="admin-bar">MASTER ACCESS: Editing all logs enabled.</div>
    <div class="month-nav">
        <span class="nav-arrow" onclick="changeMonth(-1)">&#10094;</span>
        <h2 id="currentMonthDisplay">April 2026</h2>
        <span class="nav-arrow" onclick="changeMonth(1)">&#10095;</span>
    </div>
    <div class="payee-info">
        <div class="header-grid">
            <div>
                <input type="text" id="payeeName" placeholder="PAYEE NAME" style="font-size: 24px; font-weight: bold;">
                <input type="text" id="firmName" placeholder="Attorney / Firm Name">
                <input type="text" id="addressLine1" placeholder="Street Address">
                <input type="text" id="addressLine3" placeholder="City, State, Zip">
            </div>
            <div style="text-align: right;">
                <div>Invoice #: <input type="text" id="invNum" placeholder="JT0326" style="width: 100px; text-align: right;"></div>
                <div id="userDisplay" style="margin-top:10px; color:#888; font-size:12px;">Logged in: --</div>
            </div>
        </div>
    </div>
    <div id="invoiceContainer"></div>
    <div class="controls">
        <button class="btn btn-save" onclick="saveData(true)">Sync to Cloud</button>
        <button class="btn btn-excel" onclick="exportToExcel()">Export Excel</button>
        <div class="grand-total-box">
            <div>Hours: <span id="totalHours">0.00</span></div>
            <div>Total: <span id="grandTotal">$0.00</span></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://cfliviopdogrljkxzuaa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_NL24nDck9VjS3QMbzIPwDg_bWzWUpW9';
    const MASTER_KEY = 'FINANCE2026'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUserCode = "";
    let isAdmin = false;
    let currentInvoiceDate = new Date(2026, 3);
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function attemptLogin() {
        const code = document.getElementById('accessCode').value;
        if (!code) return;
        if (code === MASTER_KEY) {
            isAdmin = true;
            currentUserCode = "MASTER";
            document.getElementById('adminNotice').style.display = "block";
        } else {
            currentUserCode = code;
        }
        document.getElementById('loginOverlay').style.display = "none";
        document.getElementById('userDisplay').innerText = "Logged in: " + currentUserCode;
        updateMonthDisplay();
        loadData();
    }

    function updateMonthDisplay() {
        document.getElementById('currentMonthDisplay').innerText = `${months[currentInvoiceDate.getMonth()]} ${currentInvoiceDate.getFullYear()}`;
    }

    async function changeMonth(delta) {
        await saveData(false);
        document.getElementById('invoiceContainer').innerHTML = "";
        currentInvoiceDate.setMonth(currentInvoiceDate.getMonth() + delta);
        updateMonthDisplay();
        await loadData();
    }

    function createSection(savedData = null) {
        const cat = savedData ? savedData.category : "Services";
        const id = savedData ? savedData.id : Date.now();
        const section = document.createElement('div');
        section.id = `sec-${id}`;
        section.innerHTML = `
            <div class="section-bar"><span>${cat}</span> <span>Rate: $<input type="number" class="sec-rate" value="${savedData?.rate || 0}" style="width:50px" oninput="calcAll()"></span></div>
            <table>
                <tbody id="body-${id}"></tbody>
                <tr class="total-row"><td colspan="2" style="text-align:right">SUBTOTAL</td><td id="time-${id}">0.00</td><td id="price-${id}">$0.00</td></tr>
            </table>
            <button onclick="addRow('${id}')" style="margin:10px 0; cursor:pointer">+ Add Line</button>
        `;
        document.getElementById('invoiceContainer').appendChild(section);
        if (savedData) savedData.rows.forEach(r => addRow(id, r)); else addRow(id);
        calcAll();
    }

    function addRow(id, data = null) {
        const tr = document.createElement('tr');
        tr.className = "item-row";
        tr.innerHTML = `
            <td><input type="date" value="${data?.date || ''}" onchange="calcAll()"></td>
            <td><input type="text" value="${data?.desc || ''}" placeholder="Service Description" spellcheck="true"></td>
            <td><input type="number" step="0.01" value="${data?.time || ''}" class="time-in" onchange="handleRounding(this);calcAll()"></td>
            <td class="row-total" style="text-align:right; padding-right:10px">$0.00</td>
        `;
        document.getElementById(`body-${id}`).appendChild(tr);
    }

    function handleRounding(input) {
        let val = parseFloat(input.value) || 0;
        input.value = (Math.round(val * 10) / 10).toFixed(2);
    }

    function calcAll() {
        let grandH = 0, grandP = 0;
        document.querySelectorAll('[id^="sec-"]').forEach(sec => {
            let sH = 0, sP = 0;
            const rate = parseFloat(sec.querySelector('.sec-rate').value) || 0;
            sec.querySelectorAll('.item-row').forEach(row => {
                const t = parseFloat(row.querySelector('.time-in').value) || 0;
                const total = t * rate;
                row.querySelector('.row-total').innerText = `$${total.toFixed(2)}`;
                sH += t; sP += total;
            });
            const id = sec.id.replace('sec-', '');
            document.getElementById(`time-${id}`).innerText = sH.toFixed(2);
            document.getElementById(`price-${id}`).innerText = `$${sP.toFixed(2)}`;
            grandH += sH; grandP += sP;
        });
        document.getElementById('totalHours').innerText = grandH.toFixed(2);
        document.getElementById('grandTotal').innerText = `$${grandP.toFixed(2)}`;
    }

    async function saveData(showAlert) {
        const sections = Array.from(document.querySelectorAll('[id^="sec-"]')).map(sec => ({
            category: sec.querySelector('.section-bar span').innerText,
            rate: sec.querySelector('.sec-rate').value,
            rows: Array.from(sec.querySelectorAll('.item-row')).map(row => ({
                date: row.cells[0].querySelector('input').value,
                desc: row.cells[1].querySelector('input').value,
                time: row.cells[2].querySelector('input').value
            }))
        }));
        const payload = {
            month_year: `${months[currentInvoiceDate.getMonth()]}_${currentInvoiceDate.getFullYear()}_${currentUserCode}`,
            user_code: currentUserCode,
            payee: document.getElementById('payeeName').value,
            firm: document.getElementById('firmName').value,
            inv_num: document.getElementById('invNum').value,
            sections: sections
        };
        const { error } = await supabaseClient.from('invoices').upsert(payload);
        if (showAlert) alert(error ? "Sync Error" : "Cloud Sync Success!");
    }

    async function loadData() {
        const monthKey = `${months[currentInvoiceDate.getMonth()]}_${currentInvoiceDate.getFullYear()}_${currentUserCode}`;
        const { data } = await supabaseClient.from('invoices').select('*').eq('month_year', monthKey).single();
        if (data) {
            document.getElementById('payeeName').value = data.payee;
            document.getElementById('firmName').value = data.firm;
            document.getElementById('invNum').value = data.inv_num;
            data.sections.forEach(s => createSection(s));
        } else if (!isAdmin) {
            createSection();
        }
    }
    
    function exportToExcel() {
        let exportData = [];
        exportData.push([document.getElementById('payeeName').value]);
        exportData.push([document.getElementById('firmName').value]);
        exportData.push([]);
        exportData.push(["Invoice #:", document.getElementById('invNum').value]);
        exportData.push([]);
        document.querySelectorAll('[id^="sec-"]').forEach(sec => {
            const title = sec.querySelector('.section-bar span').innerText;
            exportData.push([title.toUpperCase()]);
            exportData.push(["Date", "Description", "Time", "Amount"]);
            sec.querySelectorAll('.item-row').forEach(row => {
                const cells = row.querySelectorAll('input');
                exportData.push([cells[0].value, cells[1].value, cells[2].value, row.querySelector('.row-total').innerText]);
            });
            exportData.push([]);
        });
        const ws = XLSX.utils.aoa_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Invoice");
        XLSX.writeFile(wb, "Invoice_Export.xlsx");
    }
</script>
</body>
</html>
