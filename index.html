<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legal Invoice Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 20px; background-color: #fff; color: #000; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Payee Section Styling */
        .payee-info { margin-bottom: 20px; border: 1px solid #000; padding: 15px; }
        .payee-info h1 { margin: 0; font-size: 24px; text-decoration: underline; }
        .payee-info input { border: none; border-bottom: 1px solid #ccc; width: 300px; padding: 5px; margin: 5px 0; outline: none; }

        .setup-area { background: #f0f0f0; padding: 15px; margin-bottom: 20px; border: 1px solid #ccc; display: flex; gap: 10px; align-items: center; }
        
        /* Spreadsheet Table Layout */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background-color: #e2e2e2; border: 1px solid #000; padding: 8px; font-size: 13px; }
        td { border: 1px solid #000; padding: 0; }
        input, select { width: 100%; border: none; padding: 8px; box-sizing: border-box; font-size: 13px; font-family: Arial; }
        
        .section-header-row { background-color: #fff; font-weight: bold; }
        .total-row { background-color: #ffff00; font-weight: bold; } /* Yellow like the spreadsheet */
        
        .controls { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
        .grand-total-box { border: 3px double #000; padding: 10px 20px; font-size: 1.5em; font-weight: bold; background: #ffff00; }
        
        .btn { padding: 10px 20px; cursor: pointer; font-weight: bold; border: 1px solid #000; }
        .btn-add { background: #007bff; color: white; }
        .btn-excel { background: #1d6f42; color: white; }
        
        /* Hide buttons during print/export if needed */
        @media print { .setup-area, .btn, .delete-btn { display: none; } }
        .delete-btn { background: none; border: none; color: red; cursor: pointer; font-weight: bold; width: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="payee-info">
        <h1>INVOICE</h1>
        <div style="display: flex; justify-content: space-between; margin-top: 15px;">
            <div>
                <input type="text" placeholder="Your Name / Firm (Payee)"> <br>
                <input type="text" placeholder="Address"> <br>
                <input type="text" placeholder="City, State, Zip">
            </div>
            <div style="text-align: right;">
                Date: <span id="todayDate"></span> <br>
                Invoice #: <input type="text" placeholder="2026-001" style="width: 100px; text-align: right;">
            </div>
        </div>
    </div>

    <div class="setup-area">
        <strong>Create New Section:</strong>
        <select id="categorySelector">
            <option value="">-- Choose --</option>
            <option value="Defendant">Defendant</option>
            <option value="Training">Training</option>
            <option value="MCLAP General">MCLAP General</option>
            <option value="Expenses">Expenses</option>
        </select>
        <button class="btn btn-add" onclick="createSection()">+ Add to Grid</button>
    </div>

    <div id="invoiceContainer"></div>

    <div class="controls">
        <button class="btn btn-excel" onclick="exportToExcel()">Export to Excel (.xlsx)</button>
        <div class="grand-total-box">
            Grand Total: <span id="grandTotal">$0.00</span>
        </div>
    </div>
</div>

<script>
    window.onload = () => { document.getElementById('todayDate').innerText = new Date().toLocaleDateString(); };

    function createSection() {
        const cat = document.getElementById('categorySelector').value;
        if (!cat) return;
        const id = Date.now();
        
        const section = document.createElement('div');
        section.style.marginBottom = "30px";
        section.id = `sec-${id}`;
        
        const headerHtml = (cat === "Defendant") 
            ? `<input type="text" placeholder="ENTER DEFENDANT NAME HERE" style="font-weight:bold; background:#f9f9f9; border-bottom:1px solid #000;">` 
            : `<div style="padding:8px; font-weight:bold; background:#f9f9f9;">${cat}</div>`;

        section.innerHTML = `
            ${headerHtml}
            <table>
                <thead>
                    <tr>
                        <th style="width: 100px;">Date</th>
                        <th style="width: 120px;">Name</th>
                        <th>Description of Legal Services</th>
                        <th style="width: 80px;">Time</th>
                        <th style="width: 90px;">Rate</th>
                        <th style="width: 100px;">Total</th>
                        <th style="width: 40px;" class="delete-btn"></th>
                    </tr>
                </thead>
                <tbody id="body-${id}">
                    <tr class="item-row">
                        <td><input type="text" placeholder="MM/DD/YYYY"></td>
                        <td><input type="text" placeholder="Name"></td>
                        <td><select>
                            <option>Select Task...</option>
                            <option>Formatting/Revising Assessment</option>
                            <option>Conference with Counsel</option>
                            <option>Drafting Case Assessment</option>
                            <option>Legal Research</option>
                            <option>Document Review</option>
                        </select></td>
                        <td><input type="number" step="0.1" class="time-in" onchange="valTime(this);calcAll()" placeholder="0.x0"></td>
                        <td><input type="number" class="rate-in" value="100" oninput="calcAll()"></td>
                        <td class="row-total">$0.00</td>
                        <td><button class="delete-btn" onclick="this.parentElement.parentElement.remove(); calcAll()">X</button></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="3" style="text-align: right; padding-right: 10px;">Total for Section</td>
                        <td class="sec-time-total" style="text-align: center;">0.00</td>
                        <td></td>
                        <td class="sec-price-total" style="text-align: right; padding-right: 8px;">$0.00</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
            <button class="btn" style="margin-top:5px; font-size:11px;" onclick="addRow('${id}')">+ Add Row</button>
        `;
        document.getElementById('invoiceContainer').appendChild(section);
    }

    function addRow(id) {
        const tr = document.createElement('tr');
        tr.className = "item-row";
        tr.innerHTML = `
            <td><input type="text" placeholder="MM/DD/YYYY"></td>
            <td><input type="text" placeholder="Name"></td>
            <td><select>
                <option>Select Task...</option>
                <option>Formatting/Revising Assessment</option>
                <option>Conference with Counsel</option>
                <option>Drafting Case Assessment</option>
                <option>Legal Research</option>
                <option>Document Review</option>
            </select></td>
            <td><input type="number" step="0.1" class="time-in" onchange="valTime(this);calcAll()" placeholder="0.x0"></td>
            <td><input type="number" class="rate-in" value="100" oninput="calcAll()"></td>
            <td class="row-total">$0.00</td>
            <td><button class="delete-btn" onclick="this.parentElement.parentElement.remove(); calcAll()">X</button></td>
        `;
        document.getElementById(`body-${id}`).appendChild(tr);
    }

    function valTime(i) { 
        let val = parseFloat(i.value) || 0;
        i.value = (Math.round(val * 10) / 10).toFixed(2).replace(/\d$/, '0'); 
    }

    function calcAll() {
        let grandTotal = 0;
        const sections = document.querySelectorAll('[id^="sec-"]');

        sections.forEach(sec => {
            let secTime = 0;
            let secPrice = 0;
            const rows = sec.querySelectorAll('.item-row');

            rows.forEach(row => {
                const t = parseFloat(row.querySelector('.time-in').value) || 0;
                const r = parseFloat(row.querySelector('.rate-in').value) || 0;
                const rowSum = t * r;
                row.querySelector('.row-total').innerText = `$${rowSum.toFixed(2)}`;
                secTime += t;
                secPrice += rowSum;
            });

            sec.querySelector('.sec-time-total').innerText = secTime.toFixed(2);
            sec.querySelector('.sec-price-total').innerText = `$${secPrice.toFixed(2)}`;
            grandTotal += secPrice;
        });

        document.getElementById('grandTotal').innerText = `$${grandTotal.toFixed(2)}`;
    }

    function exportToExcel() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.table_to_sheet(document.getElementById('invoiceContainer'));
        XLSX.utils.book_append_sheet(wb, ws, "Invoice");
        XLSX.writeFile(wb, "Legal_Invoice.xlsx");
    }
</script>
</body>
</html>
