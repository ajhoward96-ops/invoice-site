<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legal Invoice Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 20px; background-color: #fff; color: #000; }
        .container { max-width: 1100px; margin: auto; }
        
        .month-nav { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border: 1px solid #000; border-radius: 8px; }
        .month-nav h2 { margin: 0; font-size: 24px; min-width: 200px; text-align: center; }
        .nav-arrow { font-size: 24px; cursor: pointer; user-select: none; padding: 5px 15px; border: 1px solid #ccc; border-radius: 4px; background: #fff; }

        .payee-info { margin-bottom: 20px; border: 1px solid #000; padding: 20px; }
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .payee-info input { border: none; border-bottom: 1px solid #eee; width: 100%; padding: 5px; margin: 4px 0; outline: none; }

        .setup-area { background: #f8f9fa; padding: 15px; margin-bottom: 20px; border: 1px dashed #ccc; display: flex; gap: 10px; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background-color: #f2f2f2; border: 1px solid #000; padding: 8px; font-size: 12px; text-transform: uppercase; }
        td { border: 1px solid #000; padding: 0; }
        input { width: 100%; border: none; padding: 10px; box-sizing: border-box; font-size: 13px; background: transparent; }
        
        .date-error { background-color: #ffebeb !important; color: #d93025; font-weight: bold; }

        .section-bar { display: flex; justify-content: space-between; align-items: center; background: #000; color: #fff; padding: 10px 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .section-bar .right-controls { display: flex; align-items: center; gap: 15px; }
        .section-bar input { color: #fff; width: 60px; border-bottom: 1px solid #fff; }
        .toggle-btn { cursor: pointer; user-select: none; font-size: 14px; margin-right: 10px; width: 20px; display: inline-block; text-align: center; }
        
        .entity-header { background: #e9ecef; padding: 10px 15px; border: 1px solid #000; border-top: none; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .entity-header input { background: transparent; border-bottom: 1px solid #999; width: 400px; padding: 2px; }

        .total-row { background-color: #ffff00; font-weight: bold; }
        .controls { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #000; padding-top: 20px; }
        .grand-total-box { border: 3px double #000; padding: 15px 25px; font-size: 1.6em; font-weight: bold; background: #ffff00; display: flex; gap: 40px; }
        
        .btn { padding: 10px 20px; cursor: pointer; font-weight: bold; border: 1px solid #000; border-radius: 4px; }
        .btn-add { background: #007bff; color: white; border: none; }
        .btn-save { background: #28a745; color: white; border: none; }
        .btn-clear { background: #dc3545; color: white; border: none; }
        .btn-excel { background: #1d6f42; color: white; border: none; }
        .btn-delete-sec { background: #ff4d4d; color: white; border: none; padding: 5px 10px; font-size: 11px; }
        
        @media print { 
            .setup-area, .btn, .add-row-btn, .btn-delete-sec, .nav-arrow, .toggle-btn { display: none; } 
            .section-content { display: block !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="month-nav">
        <span class="nav-arrow" onclick="changeMonth(-1)">&#10094;</span>
        <h2 id="currentMonthDisplay">April 2026</h2>
        <span class="nav-arrow" onclick="changeMonth(1)">&#10095;</span>
    </div>

    <div class="payee-info" id="payeeSection">
        <div class="header-grid">
            <div>
                <input type="text" id="payeeName" placeholder="PAYEE NAME" style="font-size: 28px; font-weight: bold;" spellcheck="true">
                <input type="text" id="firmName" placeholder="Attorney / Firm Name" spellcheck="true">
                <input type="text" id="addressLine1" placeholder="Street Address" spellcheck="false">
                <input type="text" id="addressLine2" placeholder="Apt / Bldg / Suite #" spellcheck="false">
                <input type="text" id="addressLine3" placeholder="City, State, Zip" spellcheck="false">
            </div>
            <div style="text-align: right; display: flex; flex-direction: column; justify-content: space-between;">
                <div>Date: <span id="todayDate"></span></div>
                <div>Invoice #: <input type="text" id="invNum" placeholder="JT0326" style="width: 120px; text-align: right; border-bottom: 1px solid #000;"></div>
            </div>
        </div>
    </div>

    <div id="invoiceContainer"></div>

    <div class="setup-area">
        <strong>Add Section:</strong>
        <select id="categorySelector">
            <option value="">-- Choose Category --</option>
            <option value="Defendant">Defendant</option>
            <option value="Paralegal Services">Paralegal Services</option>
            <option value="Training">Training</option>
            <option value="MCLAP General">MCLAP General</option>
            <option value="Expenses">Expenses</option>
        </select>
        <button class="btn btn-add" onclick="createSection()">+ Add to Invoice</button>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-save" onclick="saveData()">Save Progress</button>
            <button class="btn btn-clear" onclick="clearAllData()">Clear All</button>
            <button class="btn btn-excel" onclick="exportToExcel()">Export to Excel</button>
        </div>
        <div class="grand-total-box" id="finalTotals">
            <div>Total Hours: <span id="totalHours">0.00</span></div>
            <div>Grand Total: <span id="grandTotal">$0.00</span></div>
        </div>
    </div>
</div>

<script>
    let currentInvoiceDate = new Date(2026, 3);

    window.onload = () => { 
        document.getElementById('todayDate').innerText = new Date().toLocaleDateString();
        updateMonthDisplay();
        loadData();
    };

    function updateMonthDisplay() {
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('currentMonthDisplay').innerText = `${months[currentInvoiceDate.getMonth()]} ${currentInvoiceDate.getFullYear()}`;
    }

    function changeMonth(delta) {
        // When changing months, clear the billing container
        if (confirm("Moving to a new month will clear the current billing data. Your header info will be saved. Continue?")) {
            document.getElementById('invoiceContainer').innerHTML = "";
            currentInvoiceDate.setMonth(currentInvoiceDate.getMonth() + delta);
            updateMonthDisplay();
            calcAll();
        }
    }

    function validateAllDates() {
        document.querySelectorAll('.item-row').forEach(row => {
            const dateInput = row.cells[0].querySelector('input');
            checkDateMatch(dateInput);
        });
    }

    function checkDateMatch(input) {
        const row = input.closest('.item-row');
        const dateValue = new Date(input.value);
        if (!isNaN(dateValue.getTime())) {
            const matches = dateValue.getUTCMonth() === currentInvoiceDate.getMonth() && 
                            dateValue.getUTCFullYear() === currentInvoiceDate.getFullYear();
            if (!matches) { row.classList.add('date-error'); } 
            else { row.classList.remove('date-error'); }
        } else { row.classList.remove('date-error'); }
    }

    function toggleSection(id, btn) {
        const content = document.getElementById('content-' + id);
        if (content.style.display === 'none') {
            content.style.display = 'block';
            btn.innerHTML = '&#9660;';
        } else {
            content.style.display = 'none';
            btn.innerHTML = '&#9658;';
        }
    }

    function createSection(savedData = null) {
        const cat = savedData ? savedData.category : document.getElementById('categorySelector').value;
        if (!cat) return;
        const id = savedData ? savedData.id : Date.now();
        const section = document.createElement('div');
        section.className = 'billing-section';
        section.style.marginBottom = "40px";
        section.id = `sec-${id}`;
        
        const showNameHeader = (cat === "Defendant" || cat === "Paralegal Services");
        const entityHeader = showNameHeader 
            ? `<div class="entity-header">Billing Entity (Name): <input type="text" class="sec-entity" value="${savedData?.entityName || ''}" placeholder="Enter Name Here" spellcheck="true"></div>`
            : '';

        section.innerHTML = `
            <div class="section-bar">
                <div style="display: flex; align-items: center;">
                    <span class="toggle-btn" onclick="toggleSection('${id}', this)">&#9660;</span>
                    <span class="sec-title">${cat}</span>
                </div>
                <div class="right-controls">
                    <div>Per Hour Rate: $<input type="number" class="sec-rate" value="${savedData?.rate || 0}" style="width: 60px;" oninput="calcAll()"></div>
                    <button class="btn-delete-sec" onclick="deleteSection('${id}')">Delete Section</button>
                </div>
            </div>
            ${entityHeader}
            <div id="content-${id}" class="section-content">
                <table>
                    <thead><tr><th style="width:150px;">Date</th><th>Description of Service</th><th style="width:100px;">Time</th><th style="width:130px;">Amount</th><th style="width:40px;"></th></tr></thead>
                    <tbody id="body-${id}"></tbody>
                    <tfoot>
                        <tr class="total-row">
                            <td colspan="2" style="text-align: right; padding-right: 15px;">SUBTOTAL</td>
                            <td class="sec-time-total" style="text-align: center;">0.00</td>
                            <td class="sec-price-total" style="text-align: right; padding-right: 10px;">$0.00</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
                <button class="btn add-row-btn" style="margin-top:8px; font-size:12px; border-color:#ccc;" onclick="addRow('${id}')">+ Add Line Item</button>
            </div>
        `;
        document.getElementById('invoiceContainer').appendChild(section);
        if (savedData) { savedData.rows.forEach(r => addRow(id, r)); } 
        else { addRow(id); }
        calcAll();
    }

    function addRow(id, data = null) {
        const tr = document.createElement('tr');
        tr.className = "item-row";
        tr.innerHTML = `
            <td><input type="date" value="${data?.date || ''}" onchange="checkDateMatch(this); calcAll()"></td>
            <td><input type="text" value="${data?.desc || ''}" placeholder="Enter service description..." spellcheck="true"></td>
            <td><input type="number" step="0.1" value="${data?.time || ''}" class="time-in" onchange="valTime(this);calcAll()" placeholder="0.00"></td>
            <td class="row-total" style="text-align: right; padding-right: 10px;">$0.00</td>
            <td><button style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;" onclick="this.parentElement.parentElement.remove(); calcAll()">X</button></td>
        `;
        document.getElementById(`body-${id}`).appendChild(tr);
        if(data?.date) { setTimeout(() => checkDateMatch(tr.querySelector('input[type="date"]')), 10); }
    }

    function deleteSection(id) {
        if (confirm("Delete this entire section?")) {
            document.getElementById(`sec-${id}`).remove();
            calcAll();
        }
    }

    function clearAllData() {
        if (confirm("Wipe all data and start a new invoice?")) {
            localStorage.removeItem('invoice_data');
            location.reload();
        }
    }

    function valTime(i) { 
        let val = parseFloat(i.value) || 0;
        i.value = val.toFixed(2); 
    }

    function calcAll() {
        let grand = 0, grandHours = 0;
        document.querySelectorAll('[id^="sec-"]').forEach(sec => {
            let sTime = 0, sPrice = 0;
            const rate = parseFloat(sec.querySelector('.sec-rate').value) || 0;
            sec.querySelectorAll('.item-row').forEach(row => {
                const t = parseFloat(row.querySelector('.time-in').value) || 0;
                const rowSum = t * rate;
                row.querySelector('.row-total').innerText = `$${rowSum.toFixed(2)}`;
                sTime += t; sPrice += rowSum;
            });
            sec.querySelector('.sec-time-total').innerText = sTime.toFixed(2);
            sec.querySelector('.sec-price-total').innerText = `$${sPrice.toFixed(2)}`;
            grand += sPrice; grandHours += sTime;
        });
        const grandDisplay = document.getElementById('grandTotal');
        const hourDisplay = document.getElementById('totalHours');
        if(grandDisplay) grandDisplay.innerText = `$${grand.toFixed(2)}`;
        if(hourDisplay) hourDisplay.innerText = grandHours.toFixed(2);
    }

    function saveData() {
        const sections = Array.from(document.querySelectorAll('[id^="sec-"]')).map(sec => ({
            id: sec.id.replace('sec-', ''),
            category: sec.querySelector('.sec-title').innerText,
            entityName: sec.querySelector('.sec-entity')?.value || "",
            rate: sec.querySelector('.sec-rate').value,
            rows: Array.from(sec.querySelectorAll('.item-row')).map(row => ({
                date: row.cells[0].querySelector('input').value,
                desc: row.cells[1].querySelector('input').value,
                time: row.cells[2].querySelector('input').value
            }))
        }));
        localStorage.setItem('invoice_data', JSON.stringify({
            payee: document.getElementById('payeeName').value,
            firm: document.getElementById('firmName').value,
            addressLine1: document.getElementById('addressLine1').value,
            addressLine2: document.getElementById('addressLine2').value,
            addressLine3: document.getElementById('addressLine3').value,
            invNum: document.getElementById('invNum').value,
            month: currentInvoiceDate.getMonth(),
            year: currentInvoiceDate.getFullYear(),
            sections: sections
        }));
        alert("Invoice progress saved!");
    }

    function loadData() {
        const saved = JSON.parse(localStorage.getItem('invoice_data'));
        if (!saved) return;
        document.getElementById('payeeName').value = saved.payee || "";
        document.getElementById('firmName').value = saved.firm || "";
        document.getElementById('addressLine1').value = saved.addressLine1 || "";
        document.getElementById('addressLine2').value = saved.addressLine2 || "";
        document.getElementById('addressLine3').value = saved.addressLine3 || "";
        document.getElementById('invNum').value = saved.invNum || "";
        if(saved.month !== undefined) {
            currentInvoiceDate = new Date(saved.year, saved.month);
            updateMonthDisplay();
        }
        saved.sections.forEach(s => createSection(s));
    }

    function exportToExcel() {
        let exportData = [];
        let rowsMeta = [];

        exportData.push([document.getElementById('payeeName').value]);
        exportData.push([document.getElementById('firmName').value]);
        exportData.push([document.getElementById('addressLine1').value]);
        exportData.push([document.getElementById('addressLine2').value]);
        exportData.push([document.getElementById('addressLine3').value]);
        exportData.push([]);
        exportData.push(["Invoice Date:", document.getElementById('todayDate').innerText]);
        exportData.push(["Invoice #:", document.getElementById('invNum').value]);
        exportData.push([]);

        document.querySelectorAll('[id^="sec-"]').forEach(sec => {
            const title = sec.querySelector('.sec-title').innerText;
            const rate = sec.querySelector('.sec-rate').value;
            const entity = sec.querySelector('.sec-entity')?.value || "N/A";

            exportData.push([title.toUpperCase(), "", "", "Rate per Hour:", `$${rate}`]);
            if (entity !== "N/A") exportData.push(["Billing Entity:", entity]);
            exportData.push(["Date", "Description", "Time", "Amount"]);
            
            sec.querySelectorAll('.item-row').forEach(row => {
                const cells = row.querySelectorAll('input');
                exportData.push([cells[0].value, cells[1].value, cells[2].value, row.querySelector('.row-total').innerText]);
            });

            exportData.push(["", "SUBTOTAL", sec.querySelector('.sec-time-total').innerText, sec.querySelector('.sec-price-total').innerText]);
            exportData.push([]); 
        });

        exportData.push(["FINAL SUMMARY"]);
        exportData.push(["Total Hours:", document.getElementById('totalHours').innerText]);
        exportData.push(["Grand Total:", document.getElementById('grandTotal').innerText]);

        const ws = XLSX.utils.aoa_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Legal Invoice");
        XLSX.writeFile(wb, "Legal_Invoice_Export.xlsx");
    }
</script>
</body>
</html>
